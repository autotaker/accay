component: cli-workspace
operations:
  initWorkspace:
    kind: cli
    command: accay init [--root <path>]
    positional_arguments: []
    parameters:
    - name: root
      flags:
      - --root
      type: string
      required: false
      repeatable: false
      value_name: path
      meaning: Repository root to operate on
    environment_variables: []
    standard_streams:
      stdin: null
      stdout:
        media_type: text/plain
        meaning: Human-readable command summary
      stderr:
        media_type: text/plain
        meaning: User-facing errors and unexpected failures
    exit_codes:
      success:
      - 0
      failure:
      - 1
  installSkills:
