        type: string
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: true
  RegressionCommandResult:
    type: object
    additionalProperties: false
    properties:
      exit_code:
        type: integer
      report_paths:
        type: array
        items:
          type: string
      component_results:
        type: array
        items:
          type: object
          additionalProperties: true
      case_results:
        type: array
        items:
          type: object
          additionalProperties: true
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: true
  ServeReportsResult:
    type: object
    additionalProperties: false
    properties:
      exit_code:
        type: integer
      url:
        type: string
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: true
