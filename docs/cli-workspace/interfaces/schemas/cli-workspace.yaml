      root:
        type: string
      config_defaults:
        type: object
        additionalProperties: true
  InstallSkillsInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      install_dir:
        type: string
  ValidateWorkspaceInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      junit_paths:
        type: array
        items:
          type: string
  ValidateSystemInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      scenario:
        type: string
  ValidateComponentInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      component:
        type: string
  PackDeskDebugContextInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      scenario:
        type: string
  PackReviewContextInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      component:
        type: string
      case_id:
        type: string
      junit_paths:
        type: array
        items:
          type: string
  RunRegressionInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      junit_paths:
        type: array
        items:
          type: string
  RunComponentRegressionInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      component:
        type: string
      junit_paths:
        type: array
        items:
          type: string
  ServeReportsInput:
    type: object
    additionalProperties: false
    properties:
      root:
        type: string
      report_dir:
        type: string
      host:
        type: string
      port:
        type: integer
  WorkspaceMutationResult:
    type: object
    additionalProperties: false
    properties:
      exit_code:
        type: integer
      created_paths:
        type: array
        items:
          type: string
      existing_paths:
        type: array
        items:
          type: string
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: true
  ValidationCommandResult:
    type: object
    additionalProperties: false
    properties:
      exit_code:
        type: integer
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: true
      report_paths:
        type: array
        items:
          type: string
  ContextPackCommandResult:
    type: object
    additionalProperties: false
    properties:
      exit_code:
        type: integer
