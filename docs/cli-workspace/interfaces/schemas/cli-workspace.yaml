$schema: https://json-schema.org/draft/2020-12/schema
$id: docs/cli-workspace/interfaces/schemas/cli-workspace.yaml
title: cli-workspace interface schemas
type: object
additionalProperties: false
$defs:
  InitWorkspaceInput:
