component: component-artifacts
operations:
  discoverComponents:
    kind: function
    signature: 'discoverComponents(components_root: Path) -> ComponentInventory'
    schema_refs:
      ComponentInventory: docs/component-artifacts/interfaces/schemas/component-artifacts.yaml#/$defs/ComponentInventory
  loadComponentArtifacts:
    kind: function
    signature: 'loadComponentArtifacts(components_root: Path, component: str) -> ComponentArtifactSet'
    schema_refs:
      ComponentArtifactSet: docs/component-artifacts/interfaces/schemas/component-artifacts.yaml#/$defs/ComponentArtifactSet
  loadAcceptanceScope:
    kind: function
    signature: 'loadAcceptanceScope(component_path: Path) -> AcceptanceScopeArtifact'
    schema_refs:
      AcceptanceScopeArtifact: docs/component-artifacts/interfaces/schemas/component-artifacts.yaml#/$defs/AcceptanceScopeArtifact
  loadTestMap:
    kind: function
    signature: 'loadTestMap(component_path: Path) -> TestMapArtifact'
    schema_refs:
      TestMapArtifact: docs/component-artifacts/interfaces/schemas/component-artifacts.yaml#/$defs/TestMapArtifact
