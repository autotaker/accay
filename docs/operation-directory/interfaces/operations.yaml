component: operation-directory
operations:
  buildOperationDirectory:
    kind: function
    signature: 'buildOperationDirectory(component_interfaces: list[ComponentInterfaceSource]) -> OperationDirectory'
    schema_refs:
      ComponentInterfaceSource: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/ComponentInterfaceSource
      OperationDirectory: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/OperationDirectory
  lookupOperation:
    kind: function
    signature: 'lookupOperation(component: str, operation: str) -> OperationLookupResult'
    schema_refs:
      OperationLookupResult: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/OperationLookupResult
  resolveInputSchema:
    kind: function
    signature: 'resolveInputSchema(component: str, operation: str) -> SchemaResolutionResult'
    schema_refs:
      SchemaResolutionResult: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/SchemaResolutionResult
  resolveOutputSchema:
    kind: function
    signature: 'resolveOutputSchema(component: str, operation: str) -> SchemaResolutionResult'
    schema_refs:
      SchemaResolutionResult: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/SchemaResolutionResult
  checkHttpStatus:
    kind: function
    signature: 'checkHttpStatus(component: str, operation: str, status: int) -> StatusCheckResult'
    schema_refs:
      StatusCheckResult: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/StatusCheckResult
  checkCliExitCode:
    kind: function
    signature: 'checkCliExitCode(component: str, operation: str, exit_code: int) -> ExitCodeCheckResult'
    schema_refs:
      ExitCodeCheckResult: docs/operation-directory/interfaces/schemas/operation-directory.yaml#/$defs/ExitCodeCheckResult
